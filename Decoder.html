
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership Decoder</title>
<style>
body{font-family:Arial;background:#f0f4f8;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#fff;border:1px solid #dde2ea;border-radius:8px;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee}
th{background:#1F4E79;color:#fff}
</style>
</head>
<body>
<div class="container">

<h2>Leadership Decoder</h2>
<p>Paste submission data below to review potential role alignment.</p>

<div class="card">
<textarea style="width:100%;height:120px" placeholder="Paste data here..."></textarea>
<br><br>
<button onclick="decode()">Decode</button>
</div>

<div class="card" id="results" style="display:none">
<h3>Results</h3>
<table>
<thead><tr><th>Name</th><th>Suggested Role</th><th>Category</th></tr></thead>
<tbody id="table-body"></tbody>
</table>
</div>

</div>

<script>
function decode(){
 const data=[
  {name:'Sample User',role:'Systems Administrator',category:'Platform'},
  {name:'Sample User 2',role:'Data Analyst',category:'Data'}
 ];
 const body=document.getElementById('table-body');
 body.innerHTML=data.map(d=>`<tr><td>${d.name}</td><td>${d.role}</td><td>${d.category}</td></tr>`).join('');
 document.getElementById('results').style.display='block';
}
</script>

</body>
</html>
